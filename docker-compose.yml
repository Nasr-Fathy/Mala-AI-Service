services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mala_ai_service
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env
    volumes:
      - ~/.config/gcloud:/home/appuser/.config/gcloud:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mala_network

networks:
  mala_network:
    external: true
